name: Akhenaten CI

on:
  push:
    branches: [ "master" ]
  pull_request_target:
    branches: [ "master" ]

permissions:
  pull-requests: write
  contents: read

jobs:
  clang-format:
    uses: ./.github/workflows/akhenaten_clang_format.yml
    with:
      base_branch: ${{ github.event.pull_request.base.ref || 'master' }}
      pull_request_number: ${{ github.event.pull_request.number || '' }}
      event_name: ${{ github.event_name }}
      event_before: ${{ github.event.before }}
      head_sha: ${{ github.event.pull_request.head.sha || '' }}
    secrets: inherit

  content:
    needs: clang-format
    if: always() && github.event_name == 'push'
    uses: ./.github/workflows/akhenaten_content.yml
    secrets: inherit

  build-android:
    needs: clang-format
    if: always() && (github.event_name == 'push' || needs.clang-format.result == 'success')
    uses: ./.github/workflows/akhenaten_android.yml

  build-bazzite:
    needs: clang-format
    if: always() && (github.event_name == 'push' || needs.clang-format.result == 'success')
    uses: ./.github/workflows/akhenaten_bazzite.yml
    
  build-emscripten:
    needs: clang-format
    if: always() && (github.event_name == 'push' || needs.clang-format.result == 'success')
    uses: ./.github/workflows/akhenaten_emscripten.yml
    secrets: inherit

  build-flatpak:
    needs: clang-format
    if: always() && (github.event_name == 'push' || needs.clang-format.result == 'success')
    uses: ./.github/workflows/akhenaten_flatpak.yml

  build-linux:
    needs: clang-format
    if: always() && (github.event_name == 'push' || needs.clang-format.result == 'success')
    uses: ./.github/workflows/akhenaten_linux.yml   

  build-mac_arm:
    needs: clang-format
    if: always() && (github.event_name == 'push' || needs.clang-format.result == 'success')
    uses: ./.github/workflows/akhenaten_mac_arm.yml
    
  build-mac_x64:
    needs: clang-format
    if: always() && (github.event_name == 'push' || needs.clang-format.result == 'success')
    uses: ./.github/workflows/akhenaten_mac_x64.yml

  build-windows:
    needs: clang-format
    if: always() && (github.event_name == 'push' || needs.clang-format.result == 'success')
    uses: ./.github/workflows/akhenaten_windows.yml