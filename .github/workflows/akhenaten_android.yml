name: Akhenaten Build Android

# Auto-triggers temporarily disabled — Android build is currently broken.
# Re-enable push/pull_request once the build is fixed; meanwhile it can
# still be run manually from the Actions tab via workflow_dispatch.
on:
  workflow_dispatch:

jobs:
  build:
    name: run on linux
    runs-on: ubuntu-22.04
    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0
    - uses: actions/setup-java@v4
      with:
        java-version: 17
        distribution: temurin
    - name: update-workspace
      run: |
        sudo apt -qq update
        sudo apt install --yes cmake build-essential ninja-build libsdl2-dev libsdl2-mixer-dev
    - name: build-project
      run: |
        mkdir build
        cd build
        cmake -DCMAKE_BUILD_DEPENDENCIES=android ..
        cd ..
    - name: Build APK
      run: |
        cd android
        bash ./gradlew assembleDebug --stacktrace
    - name: Upload APK
      uses: actions/upload-artifact@v6
      with:
        name: apk
        path: android/akhenaten/build/outputs/apk/debug/akhenaten-debug.apk